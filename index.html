<body>

<section class="section" id="adultSection"><div class="section-header"><h2>Adult</h2></div><div class="movies" id="AdultGrid"></div></section>

<div class="modal" id="modal">
<div class="modal-box">
<img id="modalBanner" class="modal-banner">

<div class="modal-content">
<span class="close" onclick="closeModal()">×</span>

<h2 id="modalTitle"></h2>
<p id="modalDesc"></p>

<video id="moviePlayer" controls width="100%" style="margin-top:20px;border-radius:10px"></video>

<div class="modal-buttons">
<button class="btn btn-primary" id="watchBtn">Watch Now</button>
<button class="btn btn-secondary">Download</button>
</div>

</div>
</div>
</div>

<footer>© 2026 CineBD OTT</footer>

<script>

/* ==============================
FIXED GLOBALS
============================== */

const TMDB_API_KEY = "ecd720c01128d1959d69001c8ae49592";
const IMG = "https://image.tmdb.org/t/p/original";
const adlink = "https://omg10.com/4/10969479";

/* ==============================
FIXED ADS
============================== */
function handleAdAction(callback){
window.open(adlink, "_blank");
setTimeout(()=>callback(), 1200);
}

/* ==============================
MOVIES
============================== */

const MY_MOVIES = [
{query:"Gangor",language:"Hindi",genre:"Adult",year:"2026",isNew:true,link:"https://gofile.io/d/ro9b8V",createdAt:"2026-05-19"},
{query:"Youth",language:"Hindi",genre:"Romance",year:"2026",isNew:true,link:"https://1024terabox.com/s/11pqlJ4uC_Z5zq5uOnQl-3w",createdAt:"2026-05-13"},
{query:"Mission Impossible - The Final Reckoning",language:"Hindi Dubbed",genre:"Action",year:"2026",isNew:true,link:"https://gofile.io/d/rpnACX",createdAt:"2026-05-14"},
{query:"Kaalidas 2",language:"Hindi",genre:"Thriller",year:"2026",isNew:true,link:"https://gofile.io/d/WhcuPF",createdAt:"2026-05-17"}
];

let movies=[];
let heroIndex=0;
let selectedMovie=null;

/* ==============================
TMDB
============================== */

async function tmdbSearch(query){
try{
const res = await fetch(`https://api.themoviedb.org/3/search/movie?api_key=${TMDB_API_KEY}&query=${encodeURIComponent(query)}`);
const data = await res.json();
return data.results ? data.results[0] : null;
}catch(e){
return null;
}
}

/* ==============================
LOAD MOVIES (FIXED SAFE)
============================== */

async function loadMovies(){

movies = [];

for(const item of MY_MOVIES){

const tmdb = await tmdbSearch(item.query);

if(!tmdb) continue;

movies.push({
title: tmdb.title || item.query,
overview: tmdb.overview || "",
poster: tmdb.poster_path ? IMG + tmdb.poster_path : "",
backdrop: tmdb.backdrop_path ? IMG + tmdb.backdrop_path : "",
rating: tmdb.vote_average || 0,
year: item.year,
language: item.language,
genre: item.genre,
link: item.link,
isNew: item.isNew,
createdAt: item.createdAt
});
}

movies.sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));

renderAll();
startHero();
}

/* ==============================
RENDER (FIXED SAFE)
============================== */

function renderSection(id, list){

const grid = document.getElementById(id);
grid.innerHTML = "";

list.forEach((m) => {

grid.innerHTML += `
<div class="card" onclick="openMovie('${encodeURIComponent(m.title)}')">

${m.isNew ? `<div class="badge">NEW</div>` : ""}

<div class="rating">⭐ ${(m.rating || 0).toFixed(1)}</div>

<img src="${m.poster}">

<div class="overlay">
<div class="play"><i class="fas fa-play"></i></div>
</div>

<div class="movie-info">
<h3>${m.title}</h3>
<p class="meta">${m.year} • ${m.language}</p>
</div>

</div>
`;
});

}

/* ==============================
OPEN MOVIE (FIXED INDEX BASED)
============================== */

function openMovie(title){

const decodedTitle = decodeURIComponent(title);

selectedMovie = movies.find(m => m.title === decodedTitle);

if(!selectedMovie){
  alert("Movie not found!");
  return;
}

document.getElementById("modal").style.display = "flex";

document.getElementById("modalBanner").src = selectedMovie.backdrop || "";

document.getElementById("modalTitle").innerText = selectedMovie.title;

document.getElementById("modalDesc").innerText =
selectedMovie.overview +
" | " + selectedMovie.language +
" | " + selectedMovie.genre +
" | " + selectedMovie.year;

document.getElementById("watchBtn").onclick = () => {

const player = document.getElementById("moviePlayer");

player.src = selectedMovie.link;
player.play();

};

}

/* ==============================
CLOSE
============================== */

function closeModal(){
document.getElementById("modal").style.display="none";
const p=document.getElementById("moviePlayer");
p.pause();
p.src="";
}

/* ==============================
HERO
============================== */

function startHero(){
if(!movies.length) return;

changeHero();
setInterval(changeHero,3000);
}

function changeHero(){

const m = movies[heroIndex];
if(!m) return;

document.getElementById("heroBg").src = m.backdrop || "";
document.getElementById("heroTitle").innerText = m.title;
document.getElementById("heroDesc").innerText = m.overview;

/* HERO WATCH */
document.getElementById("heroWatch").onclick = () =>
handleAdAction(() => window.open(m.link, "_blank"));

/* HERO INFO (FIXED) */
document.getElementById("heroInfo").onclick = () =>
handleAdAction(() => openMovie(encodeURIComponent(m.title)));

heroIndex++;
if(heroIndex >= movies.length) heroIndex = 0;
}
/* ==============================
INIT
============================== */

loadMovies();

</script>

</body>
</html>
