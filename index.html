<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>CineBD OTT</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

<style>
body{margin:0;font-family:Arial;background:#050505;color:#fff}
header{display:flex;gap:10px;align-items:center;padding:15px;background:#111;position:sticky;top:0}
.logo{font-size:20px;font-weight:bold}

.search{flex:1;padding:10px;border-radius:5px;border:none}

.hero{padding:15px}
.hero img{width:100%;height:250px;object-fit:cover;border-radius:10px}

.section{padding:15px}
.movies{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}

.card{background:#111;border-radius:10px;overflow:hidden;cursor:pointer}
.card img{width:100%;height:180px;object-fit:cover}

.info{padding:10px}

.btn{padding:8px 12px;border:none;border-radius:5px;cursor:pointer}
.btn-primary{background:red;color:#fff}
.btn-secondary{background:#333;color:#fff}

.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);align-items:center;justify-content:center;padding:20px}
.modal-box{background:#111;padding:15px;border-radius:10px;width:100%;max-width:500px}
.close{float:right;cursor:pointer;color:red}
</style>

<!-- ADS SAFE -->
<script>
(function(){
  var s=document.createElement("script");
  s.src="https://quge5.com/88/tag.min.js";
  s.setAttribute("data-zone","240867");
  s.setAttribute("async","true");
  s.setAttribute("data-cfasync","false");
  document.head.appendChild(s);
})();
</script>

</head>

<body>

<header>
<div class="logo">CineBD</div>
<input class="search" id="search" placeholder="Search Movies...">
</header>

<!-- HERO -->
<div class="hero">
<img id="heroImg">
<h2 id="heroTitle"></h2>
<p id="heroDesc"></p>

<button class="btn btn-primary" id="heroWatch">Watch Now</button>
<button class="btn btn-secondary" id="heroInfo">More Info</button>
</div>

<!-- GRID -->
<div class="section">
<div class="movies" id="grid"></div>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-box">
<span class="close" onclick="closeModal()">X</span>

<h2 id="mTitle"></h2>
<p id="mDesc"></p>

<video id="player" controls style="width:100%"></video>

<br><br>

<button class="btn btn-primary" onclick="watchNow()">Watch Now</button>
<button class="btn btn-secondary" onclick="downloadNow()">Download</button>

</div>
</div>

<script>

/* =====================
TMDB
===================== */
const TMDB_API_KEY="ecd720c01128d1959d69001c8ae49592";
const IMG="https://image.tmdb.org/t/p/original";

/* =====================
ADS
===================== */
const adlink="https://omg10.com/4/10969479";

function handleAdAction(cb){
window.open(adlink,"_blank");
setTimeout(cb,1000);
}

/* =====================
DATA
===================== */
const MY_MOVIES=[
{query:"Gangor",link:"#"},
{query:"Youth",link:"#"},
{query:"Kaalidas 2",link:"#"}
];

let movies=[];
let heroIndex=0;
let selected=null;

/* =====================
TMDB
===================== */
async function tmdbSearch(q){
try{
const r=await fetch(`https://api.themoviedb.org/3/search/movie?api_key=${TMDB_API_KEY}&query=${encodeURIComponent(q)}`);
const d=await r.json();
return d.results?d.results[0]:null;
}catch(e){return null;}
}

/* =====================
LOAD
===================== */
async function loadMovies(){
movies=[];

for(const item of MY_MOVIES){

const t=await tmdbSearch(item.query);
if(!t)continue;

movies.push({
title:t.title,
desc:t.overview,
img:t.poster_path?IMG+t.poster_path:"",
backdrop:t.backdrop_path?IMG+t.backdrop_path:"",
link:item.link
});
}

render();
startHero();
}

/* =====================
RENDER
===================== */
function render(){
const g=document.getElementById("grid");
g.innerHTML="";

movies.forEach((m,i)=>{
g.innerHTML+=`
<div class="card" onclick="openMovie(${i})">
<img src="${m.img}">
<div class="info">
<h4>${m.title}</h4>
<p>${m.desc.slice(0,60)}</p>
</div>
</div>`;
});
}

/* =====================
OPEN MODAL
===================== */
function openMovie(i){
selected=movies[i];

document.getElementById("modal").style.display="flex";
document.getElementById("mTitle").innerText=selected.title;
document.getElementById("mDesc").innerText=selected.desc;

document.getElementById("player").src="";
}

/* =====================
BUTTONS INSIDE MODAL
===================== */
function watchNow(){
handleAdAction(()=>document.getElementById("player").play());
}

function downloadNow(){
handleAdAction(()=>window.open(selected.link,"_blank"));
}

function closeModal(){
document.getElementById("modal").style.display="none";
document.getElementById("player").src="";
}

/* =====================
HERO
===================== */
function startHero(){
if(!movies.length)return;

setInterval(()=>{
const m=movies[heroIndex];

document.getElementById("heroImg").src=m.backdrop;
document.getElementById("heroTitle").innerText=m.title;
document.getElementById("heroDesc").innerText=m.desc;

heroWatch.onclick=()=>handleAdAction(()=>window.open(m.link,"_blank"));
heroInfo.onclick=()=>handleAdAction(()=>openMovie(heroIndex));

heroIndex++;
if(heroIndex>=movies.length)heroIndex=0;

},3000);
}

/* =====================
SEARCH (FIXED)
===================== */
document.getElementById("search").addEventListener("keyup",function(){

let val=this.value.toLowerCase();

const filtered=movies.filter(m=>m.title.toLowerCase().includes(val));

const g=document.getElementById("grid");
g.innerHTML="";

filtered.forEach((m,i)=>{
g.innerHTML+=`
<div class="card" onclick="openMovie(${i})">
<img src="${m.img}">
<div class="info">
<h4>${m.title}</h4>
<p>${m.desc.slice(0,60)}</p>
</div>
</div>`;
});

});

/* =====================
INIT
===================== */
loadMovies();

</script>

</body>
</html>
