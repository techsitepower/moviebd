<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>CineBD OTT</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

<style>
body{margin:0;font-family:Arial;background:#050505;color:#fff}
header{padding:15px;background:#111;position:sticky;top:0}
.logo{font-size:22px;font-weight:bold}
.hero{padding:15px}
.hero img{width:100%;height:250px;object-fit:cover;border-radius:10px}
.section{padding:15px}
.movies{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.card{background:#111;border-radius:10px;overflow:hidden;cursor:pointer}
.card img{width:100%;height:180px;object-fit:cover}
.info{padding:10px}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);align-items:center;justify-content:center;padding:20px}
.modal-box{background:#111;padding:15px;border-radius:10px;width:100%;max-width:500px}
.close{float:right;cursor:pointer;color:red}
</style>

<!-- ADS SAFE LOADER -->
<script>
(function(){
  var s=document.createElement("script");
  s.src="https://quge5.com/88/tag.min.js";
  s.setAttribute("data-zone","240867");
  s.setAttribute("async","true");
  s.setAttribute("data-cfasync","false");
  document.head.appendChild(s);
})();
</script>

</head>

<body>

<header>
<div class="logo">CineBD</div>
</header>

<div class="hero">
<img id="heroImg">
<h2 id="heroTitle"></h2>
<p id="heroDesc"></p>

<button onclick="heroWatch()">Watch</button>
<button onclick="heroInfo()">Info</button>
</div>

<div class="section">
<div class="movies" id="grid"></div>
</div>

<div class="modal" id="modal">
<div class="modal-box">
<span class="close" onclick="closeModal()">X</span>
<h2 id="mTitle"></h2>
<p id="mDesc"></p>
<video id="player" controls style="width:100%"></video>
</div>
</div>

<script>

/* =====================
TMDB KEY (NOW INCLUDED)
===================== */
const TMDB_API_KEY = "ecd720c01128d1959d69001c8ae49592";
const IMG = "https://image.tmdb.org/t/p/original";

/* =====================
ADS
===================== */
const adlink="https://omg10.com/4/10969479";

function handleAdAction(cb){
window.open(adlink,"_blank");
setTimeout(cb,1000);
}

/* =====================
MOVIES SOURCE
===================== */
const MY_MOVIES=[
{query:"Gangor",video:"#"},
{query:"Youth",video:"#"},
{query:"Kaalidas 2",video:"#"}
];

let movies=[];
let heroIndex=0;
let selected=null;

/* =====================
TMDB FETCH
===================== */
async function tmdbSearch(q){
try{
const r=await fetch(`https://api.themoviedb.org/3/search/movie?api_key=${TMDB_API_KEY}&query=${encodeURIComponent(q)}`);
const d=await r.json();
return d.results?d.results[0]:null;
}catch(e){return null;}
}

/* =====================
LOAD MOVIES
===================== */
async function load(){
movies=[];
for(const item of MY_MOVIES){

const t=await tmdbSearch(item.query);
if(!t)continue;

movies.push({
title:t.title,
desc:t.overview,
img:t.poster_path?IMG+t.poster_path:"",
backdrop:t.backdrop_path?IMG+t.backdrop_path:"",
video:item.video
});
}

render();
hero();
}

/* =====================
RENDER GRID
===================== */
function render(){
const g=document.getElementById("grid");
g.innerHTML="";
movies.forEach((m,i)=>{
g.innerHTML+=`
<div class="card" onclick="openMovie(${i})">
<img src="${m.img}">
<div class="info">
<h4>${m.title}</h4>
<p>${m.desc.slice(0,60)}</p>
</div>
</div>`;
});
}

/* =====================
OPEN MOVIE
===================== */
function openMovie(i){
selected=movies[i];
document.getElementById("modal").style.display="flex";
document.getElementById("mTitle").innerText=selected.title;
document.getElementById("mDesc").innerText=selected.desc;
document.getElementById("player").src=selected.video;
}

/* =====================
CLOSE
===================== */
function closeModal(){
document.getElementById("modal").style.display="none";
document.getElementById("player").src="";
}

/* =====================
HERO
===================== */
function hero(){

if(!movies.length)return;

const m=movies[heroIndex];

document.getElementById("heroImg").src=m.backdrop;
document.getElementById("heroTitle").innerText=m.title;
document.getElementById("heroDesc").innerText=m.desc;

heroWatch.onclick=()=>handleAdAction(()=>alert("watch"));
heroInfo.onclick=()=>handleAdAction(()=>openMovie(heroIndex));

heroIndex++;
if(heroIndex>=movies.length)heroIndex=0;
}

setInterval(hero,3000);

/* =====================
INIT
===================== */
load();

</script>

</body>
</html>
