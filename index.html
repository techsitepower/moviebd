<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MovieBD</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif
}

body{
background:#050505;
color:#fff
}

header{
height:76px;
background:#151515;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 32px;
position:sticky;
top:0;
z-index:99;
border-bottom:1px solid #222
}

.logo{
font-size:38px;
font-weight:900;
color:#fff
}

.logo span{
color:#ff004c
}

nav a{
color:#eee;
text-decoration:none;
margin:0 13px;
font-weight:800;
font-size:15px
}

.search{
width:270px;
background:#242424;
border:1px solid #333;
border-radius:7px;
padding:13px 16px;
color:#fff
}

.slider{
height:360px;
background:
linear-gradient(rgba(0,0,0,.2),rgba(0,0,0,.92)),
url("https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?q=80&w=1600") center/cover;
display:flex;
align-items:center;
justify-content:center;
text-align:center
}

.slider-box{
background:rgba(0,0,0,.55);
padding:25px 45px;
border-radius:12px;
border:1px solid #333
}

.slider h1{
font-size:54px
}

.slider p{
color:#ccc;
margin-top:8px;
font-weight:bold
}

.layout{
display:grid;
grid-template-columns:1fr 330px;
gap:30px;
padding:30px
}

.title{
font-size:26px;
margin-bottom:20px
}

.movies{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:22px
}

.card{
background:#141414;
position:relative;
overflow:hidden;
border-radius:8px;
border:1px solid #1f1f1f
}

.card img{
width:100%;
height:260px;
object-fit:cover;
display:block;
transition:.35s
}

.card:hover img{
transform:scale(1.05);
filter:brightness(.6)
}

.card h3{
font-size:17px;
padding:12px 13px 4px
}

.meta{
padding:0 13px 13px;
color:#aaa;
font-size:13px
}

.badge{
position:absolute;
right:0;
bottom:0;
background:#2f89ff;
padding:8px 12px;
font-size:12px;
font-weight:900
}

.watch{
position:absolute;
left:50%;
top:43%;
transform:translate(-50%,-50%);
background:#00c8ff;
color:white;
text-decoration:none;
padding:11px 20px;
border-radius:6px;
font-weight:900;
opacity:0;
transition:.3s
}

.card:hover .watch{
opacity:1
}

.sidebar{
position:sticky;
top:95px;
height:max-content
}

.sidebar h3{
font-size:22px;
margin-bottom:15px
}

.popular{
background:#101010;
margin-bottom:20px;
overflow:hidden;
border:1px solid #1f1f1f
}

.popular img{
width:100%;
height:145px;
object-fit:cover
}

.popular p{
font-size:13px;
padding:9px;
font-weight:800
}

.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.82);
z-index:999;
align-items:center;
justify-content:center;
padding:20px
}

.modal-box{
max-width:820px;
background:#111;
border:1px solid #333;
border-radius:12px;
overflow:hidden;
display:grid;
grid-template-columns:300px 1fr
}

.modal-box img{
width:100%;
height:100%;
object-fit:cover
}

.modal-content{
padding:24px
}

.close{
float:right;
font-size:28px;
cursor:pointer;
color:#ff004c
}

.modal-content h2{
margin-bottom:10px
}

.modal-content p{
color:#bbb;
line-height:1.6
}

.btn{
display:inline-block;
margin-top:15px;
background:#00c8ff;
color:#fff;
text-decoration:none;
padding:12px 18px;
border-radius:7px;
font-weight:900
}

footer{
text-align:center;
padding:25px;
border-top:1px solid #222;
margin-top:30px
}

@media(max-width:1050px){
.movies{
grid-template-columns:repeat(2,1fr)
}
}

@media(max-width:850px){

header{
height:auto;
gap:14px;
flex-wrap:wrap;
padding:15px
}

.search{
width:100%
}

.layout{
grid-template-columns:1fr
}

.movies{
grid-template-columns:1fr
}

.slider h1{
font-size:34px
}

.sidebar{
position:static
}

.modal-box{
grid-template-columns:1fr
}

}
</style>
</head>

<body>

<header>
<div class="logo"><span>M</span>ovieBD</div>

<nav>
<a href="#">Home</a>
<a href="#">Movies</a>
<a href="#">Genres</a>
<a href="#">TV Shows</a>
</nav>

<input id="search" class="search" placeholder="Search movies...">
</header>

<section class="slider">
<div class="slider-box">
<h1 id="slideTitle">MovieBD</h1>
<p>Movies • Documentaries • Stories</p>
</div>
</section>

<div class="layout">

<main>

<h2 class="title">Trending on MovieBD</h2>

<div class="movies" id="movieGrid"></div>

</main>

<aside class="sidebar">

<h3>Popular</h3>

<div class="popular">
<img src="https://image.tmdb.org/t/p/w500/qJ2tW6WMUDux911r6m7haRef0WH.jpg">
<p>Youth (2026)</p>
</div>

</aside>

</div>

<div class="modal" id="modal">

<div class="modal-box">

<img id="modalImg">

<div class="modal-content">

<span class="close" onclick="closeModal()">×</span>

<h2 id="modalTitle"></h2>

<p id="modalInfo"></p>

<a class="btn" href="https://omg10.com/4/10969479" target="_blank">
Watch / Get Link
</a>

</div>

</div>

</div>

<footer>
© 2026 MovieBD - All Rights Reserved
</footer>

<script>

const adlink="https://omg10.com/4/10969479";

const movies=[
{
title:"Youth",
year:"2026",
cat:"Action",
img:"https://image.tmdb.org/t/p/w780/qJ2tW6WMUDux911r6m7haRef0WH.jpg",
info:"Youth movie demo card."
}
];

const grid=document.getElementById("movieGrid");

function showMovies(list){

grid.innerHTML="";

list.forEach((m,i)=>{

grid.innerHTML+=`

<div class="card" onclick="openModal(${i})">

<img src="${m.img}">

<a class="watch" href="${adlink}" target="_blank">
Watch Now
</a>

<h3>${m.title}</h3>

<p class="meta">${m.year}</p>

<span class="badge">MOVIE</span>

</div>

`;

});

}

showMovies(movies);

document.getElementById("search").addEventListener("input",function(){

let q=this.value.toLowerCase();

showMovies(

movies.filter(m=>

m.title.toLowerCase().includes(q)

)

);

});

function openModal(i){

let m=movies[i];

document.getElementById("modal").style.display="flex";

document.getElementById("modalImg").src=m.img;

document.getElementById("modalTitle").innerText=m.title;

document.getElementById("modalInfo").innerText=m.info;

}

function closeModal(){

document.getElementById("modal").style.display="none";

}

let s=0;

setInterval(()=>{

s=(s+1)%movies.length;

document.getElementById("slideTitle").innerText=movies[s].title;

document.querySelector(".slider").style.background=

`linear-gradient(rgba(0,0,0,.2),rgba(0,0,0,.92)),url('${movies[s].img}') center/cover`;

},3000);

</script>

</body>
</html>
