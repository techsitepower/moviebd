<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MovieBD</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif
}

body{
background:#050505;
color:#fff
}

header{
height:76px;
background:#151515;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 32px;
position:sticky;
top:0;
z-index:99;
border-bottom:1px solid #222
}

.logo{
font-size:38px;
font-weight:900
}

.logo span{
color:#ff004c
}

nav a{
color:#eee;
text-decoration:none;
margin:0 13px;
font-weight:800;
font-size:15px
}

.search{
width:270px;
background:#242424;
border:1px solid #333;
border-radius:7px;
padding:13px 16px;
color:#fff
}

.slider{
height:340px;
background:
linear-gradient(rgba(0,0,0,.2),rgba(0,0,0,.92)),
url("https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?q=80&w=1600")
center/cover;
display:flex;
align-items:center;
justify-content:center;
text-align:center
}

.slider-box{
background:rgba(0,0,0,.62);
padding:25px 45px;
border-radius:12px;
border:1px solid #333
}

.slider h1{
font-size:54px
}

.slider p{
color:#ccc;
margin-top:8px;
font-weight:bold
}

.category-bar{
padding:25px 30px;
background:#080808;
display:flex;
gap:10px;
flex-wrap:wrap;
justify-content:center
}

.cat-btn{
padding:10px 18px;
border-radius:25px;
border:2px solid #00eaff;
background:#070707;
color:#fff;
font-weight:900;
cursor:pointer
}

.cat-btn.active,
.cat-btn:hover{
color:#00eaff;
box-shadow:0 0 15px rgba(0,234,255,.45)
}

.layout{
display:grid;
grid-template-columns:1fr 330px;
gap:30px;
padding:30px
}

.title{
font-size:26px;
margin-bottom:20px
}

.movies{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:22px
}

.card{
background:#141414;
position:relative;
overflow:hidden;
border-radius:8px;
border:1px solid #1f1f1f;
cursor:pointer
}

.card img{
width:100%;
height:280px;
object-fit:cover;
display:block;
transition:.35s
}

.card:hover img{
transform:scale(1.05);
filter:brightness(.55)
}

.card h3{
font-size:17px;
padding:12px 13px 4px
}

.meta{
padding:0 13px 13px;
color:#aaa;
font-size:13px
}

.badge{
position:absolute;
right:0;
bottom:0;
background:#2f89ff;
padding:8px 12px;
font-size:12px;
font-weight:900
}

.watch{
position:absolute;
left:50%;
top:43%;
transform:translate(-50%,-50%);
background:#00c8ff;
color:white;
text-decoration:none;
padding:11px 20px;
border-radius:6px;
font-weight:900;
opacity:0;
transition:.3s
}

.card:hover .watch{
opacity:1
}

.sidebar{
position:sticky;
top:95px;
height:max-content
}

.sidebar h3{
font-size:22px;
margin-bottom:15px
}

.popular{
background:#101010;
margin-bottom:20px;
overflow:hidden;
border:1px solid #1f1f1f;
cursor:pointer
}

.popular img{
width:100%;
height:145px;
object-fit:cover
}

.popular p{
font-size:13px;
padding:9px;
font-weight:800
}

.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.84);
z-index:999;
align-items:center;
justify-content:center;
padding:20px
}

.modal-box{
max-width:850px;
background:#111;
border:1px solid #333;
border-radius:12px;
overflow:hidden;
display:grid;
grid-template-columns:300px 1fr
}

.modal-box img{
width:100%;
height:100%;
object-fit:cover
}

.modal-content{
padding:24px
}

.close{
float:right;
font-size:28px;
cursor:pointer;
color:#ff004c
}

.modal-content h2{
margin-bottom:10px
}

.modal-content p{
color:#bbb;
line-height:1.6
}

.unlock-box{
margin-top:18px;
padding:15px;
background:#0a0a0a;
border:1px solid #252525;
border-radius:8px
}

.unlock-text{
font-size:14px;
color:#aaa;
margin-bottom:12px
}

.btn{
display:inline-block;
background:#00c8ff;
color:#fff;
text-decoration:none;
padding:12px 18px;
border-radius:7px;
font-weight:900;
border:0;
cursor:pointer
}

.btn.used{
background:#ff004c
}

footer{
text-align:center;
padding:25px;
border-top:1px solid #222;
margin-top:30px
}

@media(max-width:1050px){
.movies{
grid-template-columns:repeat(2,1fr)
}
}

@media(max-width:850px){

header{
height:auto;
gap:14px;
flex-wrap:wrap;
padding:15px
}

.search{
width:100%
}

.layout{
grid-template-columns:1fr
}

.movies{
grid-template-columns:1fr
}

.slider h1{
font-size:34px
}

.sidebar{
position:static
}

.modal-box{
grid-template-columns:1fr
}

}
</style>
</head>

<body>

<header>

<div class="logo">
<span>M</span>ovieBD
</div>

<nav>
<a href="#">Home</a>
<a href="#">Movies</a>
<a href="#">Categories</a>
<a href="#">Contact</a>
</nav>

<input id="search" class="search" placeholder="Search movies...">

</header>

<section class="slider" id="slider">

<div class="slider-box">
<h1 id="sliderTitle">MovieBD</h1>
<p>TMDb Auto Movie System</p>
</div>

</section>

<div class="category-bar" id="categoryBar"></div>

<div class="layout">

<main>

<h2 class="title">
Trending on MovieBD
</h2>

<div class="movies" id="movieGrid">
Loading movies...
</div>

</main>

<aside class="sidebar">

<h3>Popular</h3>

<div id="popularBox"></div>

</aside>

</div>

<div class="modal" id="modal">

<div class="modal-box">

<img id="modalImg">

<div class="modal-content">

<span class="close" onclick="closeModal()">×</span>

<h2 id="modalTitle"></h2>

<p id="modalInfo"></p>

<div class="unlock-box">

<div class="unlock-text" id="unlockText">
Click 3 ads to unlock the movie link.
</div>

<button class="btn" id="getLinkBtn" onclick="handleGetLink()">
Step 1/3 - Continue
</button>

</div>

</div>

</div>

</div>

<footer>
© 2026 MovieBD
</footer>

<script>

const TMDB_API_KEY="ecd720c01128d1959d69001c8ae49592";

const adlink="https://omg10.com/4/10969479";



/* ===========================
MOVIES ADD SECTION
===========================

NEW MOVIE ADD KORTE:

{
query:"Movie Name",
link:"Movie Link",
category:"Category Name"
},

=========================== */

const MY_LINKS=[

{
query:"Youth",
link:"https://1024terabox.com/s/11pqlJ4uC_Z5zq5uOnQl-3w",
category:"Romantic Comedy"
},

{
query:"Interstellar",
link:"https://gofile.io/d/EXAMPLE123",
category:"SciFi Adventure"
},
  
{
query:"Joker",
link:"https://pixeldrain.com/u/EXAMPLE456",
category:"Thriller Drama"
},
  
{
query:"Mission Impossible - The Final Reckoning",
link:"https://gofile.io/d/rpnACX",
category:"SciFi Adventure"
},

{
query:"Kaalidas 2",
link:"https://gofile.io/d/WhcuPF",
category:"Thriller"
},

];



const IMG="https://image.tmdb.org/t/p/w780";

let movies=[];
let currentList=[];
let selectedMovie=null;
let clickCount=0;



async function tmdbSearch(query){

const url=
`https://api.themoviedb.org/3/search/movie?api_key=${TMDB_API_KEY}&query=${encodeURIComponent(query)}`;

const res=await fetch(url);

const data=await res.json();

return data.results[0];

}



async function loadMovies(){

for(const item of MY_LINKS){

const tmdb=await tmdbSearch(item.query);

movies.push({

title:tmdb.title,

year:tmdb.release_date
? tmdb.release_date.slice(0,4)
: "Unknown",

cat:item.category,

img:tmdb.poster_path
? IMG+tmdb.poster_path
: "",

overview:tmdb.overview,

rating:tmdb.vote_average,

link:item.link

});

}

showMovies(movies);

makeCategories();

showPopular();

setHero();

}



function showMovies(list){

currentList=list;

const grid=document.getElementById("movieGrid");

grid.innerHTML="";

list.forEach((m,i)=>{

grid.innerHTML+=`

<div class="card"
onclick="openModalFromList(${i})">

<img src="${m.img}">

<a class="watch"
href="javascript:void(0)">
Watch Now
</a>

<h3>${m.title}</h3>

<p class="meta">
${m.year} • ${m.cat}
</p>

<span class="badge">
MOVIE
</span>

</div>

`;

});

}



function makeCategories(){

const cats=["All"];

movies.forEach(m=>{

m.cat.split(" ").forEach(c=>{

if(!cats.includes(c))
cats.push(c);

});

});

const bar=document.getElementById("categoryBar");

bar.innerHTML="";

cats.forEach((c,i)=>{

bar.innerHTML+=`

<button
class="cat-btn ${i===0?'active':''}"
onclick="filterCategory('${c}',this)">

${c}

</button>

`;

});

}



function showPopular(){

const box=document.getElementById("popularBox");

box.innerHTML="";

movies.forEach((m,i)=>{

box.innerHTML+=`

<div class="popular"
onclick="openModalByIndex(${i})">

<img src="${m.img}">

<p>${m.title}</p>

</div>

`;

});

}



function setHero(){

document.getElementById("sliderTitle")
.innerText=movies[0].title;

document.getElementById("slider")
.style.background=

`linear-gradient(rgba(0,0,0,.2),rgba(0,0,0,.92)),url('${movies[0].img}') center/cover`;

}



function openModalFromList(i){

selectedMovie=currentList[i];

openModalData(selectedMovie);

}



function openModalByIndex(i){

selectedMovie=movies[i];

openModalData(selectedMovie);

}



function openModalData(movie){

clickCount=0;

document.getElementById("modal")
.style.display="flex";

document.getElementById("modalImg")
.src=movie.img;

document.getElementById("modalTitle")
.innerText=movie.title;

document.getElementById("modalInfo")
.innerText=

movie.overview+

" | Category: "+movie.cat+

" | Release: "+movie.year+

" | Rating: "+movie.rating;

document.getElementById("unlockText")
.innerText=

"Click 3 ads to unlock the movie link.";

document.getElementById("getLinkBtn")
.innerText="Step 1/3 - Continue";

}



function handleGetLink(){

clickCount++;

if(clickCount<=3){

window.open(adlink,"_blank");

if(clickCount===1){

document.getElementById("getLinkBtn")
.innerText="Step 2/3 - Continue";

}

if(clickCount===2){

document.getElementById("getLinkBtn")
.innerText="Step 3/3 - Continue";

}

if(clickCount===3){

document.getElementById("getLinkBtn")
.innerText="Open Movie Link";

}

return;

}

window.open(selectedMovie.link,"_blank");

clickCount=0;

document.getElementById("unlockText")
.innerText=

"Link used. Complete steps again.";

document.getElementById("getLinkBtn")
.innerText="Get New Link";

document.getElementById("getLinkBtn")
.classList.add("used");

}



function closeModal(){

document.getElementById("modal")
.style.display="none";

clickCount=0;

}



function filterCategory(cat,btn){

document.querySelectorAll(".cat-btn")
.forEach(b=>b.classList.remove("active"));

btn.classList.add("active");

if(cat==="All"){

showMovies(movies);

return;

}

showMovies(

movies.filter(m=>

m.cat.toLowerCase()
.includes(cat.toLowerCase())

)

);

}



document.getElementById("search")
.addEventListener("input",function(){

let q=this.value.toLowerCase();

showMovies(

movies.filter(m=>

m.title.toLowerCase()
.includes(q)

)

);

});



loadMovies();

</script>

</body>
</html>
